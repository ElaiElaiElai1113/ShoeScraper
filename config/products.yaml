  #   alert_rule: first_markdown
  #
  # - label: "Adidas Samba OG"
  #   sku: "B75806"
  #   keywords: ["samba", "adidas"]
  #   retailers: [footlocker_au, culturekings]
  #   alert_rule: price_dropped

settings:
  request_timeout: 20
  sleep_between_requests: 3.0
  jitter_range: [0.5, 2.0]
  health_alert_threshold_days: 2
