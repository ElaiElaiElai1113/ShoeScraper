# ShoeScraper product configuration
# Products define what to track. Sources define where to search.

products:
  - label: "Ja Morant Air Force 1 Denim"
    sku: "IQ9773-400"
    keywords:
      - "ja morant"
      - "air force 1"
      - "denim"
    retailers:
      - nike_au
      - footlocker_au
      - subtype
      - upthere
      - culturekings
      - ebay_au
      - gumtree_au
      - facebook_marketplace
    alert_rule: any_stock

