sources:
  - id: nike_au
    name: Nike AU
    source_type: retail
    search_url: "https://www.nike.com/au/w?q={query}"
    render_mode: auto
    parser: generic
  - id: footlocker_au
    name: Foot Locker AU
    source_type: retail
    search_url: "https://www.footlocker.com.au/en/search?query={query}"
    render_mode: auto
    parser: generic
  - id: jd_sports_au
    name: JD Sports AU
    source_type: retail
    search_url: "https://www.jd-sports.com.au/search?q={query}"
    render_mode: auto
    parser: generic
  - id: platypus
    name: Platypus Shoes
    source_type: retail
    search_url: "https://www.platypusshoes.com.au/search?q={query}"
    render_mode: auto
    parser: generic
  - id: hype_dc
    name: Hype DC
    source_type: retail
    search_url: "https://www.hypedc.com/au/search?q={query}"
    render_mode: auto
    parser: generic
  - id: the_iconic
    name: THE ICONIC
    source_type: retail
    search_url: "https://www.theiconic.com.au/catalog/?q={query}"
    render_mode: auto
    parser: generic
  - id: athletes_foot
    name: The Athlete's Foot
    source_type: retail
    search_url: "https://www.theathletesfoot.com.au/catalogsearch/result/?q={query}"
    render_mode: auto
    parser: generic
  - id: subtype
    name: Subtype
    source_type: retail
    search_url: "https://subtypestore.com/search?q={query}"
    render_mode: auto
    parser: generic
  - id: upthere
    name: Up There
    source_type: retail
    search_url: "https://uptherestore.com/search?q={query}"
    render_mode: auto
    parser: generic
  - id: culturekings
    name: Culture Kings
    source_type: retail
    search_url: "https://www.culturekings.com.au/search?q={query}"
    render_mode: auto
    parser: generic
  - id: supply_store
    name: Supply Store
    source_type: retail
    search_url: "https://supplystore.com.au/search?q={query}"
    render_mode: auto
    parser: generic
  - id: shoegrab
    name: ShoeGrab
    source_type: retail
    search_url: "https://shoegrab.com.au/search?q={query}"
    render_mode: auto
    parser: generic
  - id: ebay_au
    name: eBay AU
    source_type: second_hand
    search_url: "https://www.ebay.com.au/sch/i.html?_nkw={query}&LH_ItemCondition=3000%7C1500%7C2500&LH_PrefLoc=1"
    render_mode: auto
    parser: marketplace
  - id: gumtree_au
    name: Gumtree AU
    source_type: second_hand
    search_url: "https://www.gumtree.com.au/s-sneakers-shoes/{query}/k0"
    render_mode: auto
    parser: marketplace
  - id: facebook_marketplace
    name: Facebook Marketplace
    source_type: second_hand
    search_url: "https://www.facebook.com/marketplace/sydney/search/?query={query}"
    render_mode: browser
    parser: marketplace

settings:
  request_timeout: 20
  sleep_between_requests: 3.0
  jitter_range: [0.5, 2.0]
  health_alert_threshold_days: 2
