# ShoeScraper product configuration
# Each product defines what to track and when to alert

products:
  - label: "Ja Morant Air Force 1 Denim"
    sku: "IQ9773-400"
    keywords:
      - "ja morant"
      - "air force 1"
      - "denim"
    retailers:
      - nike_au
      - footlocker_au
      - subtype
      - upthere
      - culturekings
    alert_rule: any_stock

  - label: "Nike Dunk Low IR0609-100"
    sku: "IR0609-100"
    keywords:
      - "nike dunk low"
      - "dunk low"
    retailers:
      - nike_au
      - footlocker_au
      - culturekings
    alert_rule: discount_only

  # Examples of other rule types for future products:
  #
  # - label: "Air Jordan 4 Retro Bred"
  #   sku: "DV3749-001"
  #   keywords: ["jordan 4", "bred"]
